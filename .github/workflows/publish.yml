name: Publish to NuGet

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish (e.g. 0.1.0)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token issuance for NuGet Trusted Publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Test
        run: dotnet test tests/CrossEF.Tests/CrossEF.Tests.csproj -c Release

      - name: Pack
        run: >
          dotnet pack src/CrossEF/CrossEF.csproj
          -c Release
          -o out
          /p:Version=${{ steps.version.outputs.value }}
          /p:ContinuousIntegrationBuild=true

      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived (1h, single-use)
      # nuget.org API key. Requires a Trusted Publishing policy on nuget.org matching this
      # repository and workflow file. No long-lived API key secret involved.
      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org
        run: >
          dotnet nuget push "out/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
